services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "sqlserver://db:1433;database=avaliacao_db;user=sa;password=${MSSQL_SA_PASSWORD};trustServerCertificate=true"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-8h}"
      AD_URL: "${AD_URL}"
      AD_BASE_DN: "${AD_BASE_DN}"
      AD_SERVICE_USER: "${AD_SERVICE_USER}"
      AD_SERVICE_PASSWORD: "${AD_SERVICE_PASSWORD}"
      AD_DOMAIN: "${AD_DOMAIN}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost}"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlserver_data:
